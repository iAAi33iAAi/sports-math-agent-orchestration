name: CI

on:
  push:
      branches: [ main ]
        pull_request:
            branches: [ main ]

            jobs:
              test:
                  name: Run Tests (Python ${{ matrix.python-version }})
                      runs-on: ubuntu-latest
                          strategy:
                                matrix:
                                        python-version: ["3.10", "3.11", "3.12"]
                                            steps:
                                                  - name: Checkout repository
                                                          uses: actions/checkout@v4

                                                                - name: Set up Python ${{ matrix.python-version }}
                                                                        uses: actions/setup-python@v5
                                                                                with:
                                                                                          python-version: ${{ matrix.python-version }}

                                                                                                - name: Cache pip dependencies
                                                                                                        uses: actions/cache@v4
                                                                                                                with:
                                                                                                                          path: ~/.cache/pip
                                                                                                                                    key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
                                                                                                                                              restore-keys: |
                                                                                                                                                          ${{ runner.os }}-pip-
                                                                                                                                                          
                                                                                                                                                                - name: Install dependencies
                                                                                                                                                                        run: |
                                                                                                                                                                                  python -m pip install --upgrade pip
                                                                                                                                                                                            pip install -r requirements.txt
                                                                                                                                                                                            
                                                                                                                                                                                                  - name: Run tests with pytest
                                                                                                                                                                                                          run: pytest tests/ -v --tb=short
                                                                                                                                                                                                          
                                                                                                                                                                                                                - name: Check import integrity
                                                                                                                                                                                                                        run: |
                                                                                                                                                                                                                                  python -c "from src.formulas import compute_dynamic_weight; print('formulas OK')"
                                                                                                                                                                                                                                            python -c "from src.normalization import softmax; print('normalization OK')"
                                                                                                                                                                                                                                                      python -c "from src.optimizer import greedy_knapsack; print('optimizer OK')"
                                                                                                                                                                                                                                                                python -c "from src.routing import probabilistic_route; print('routing OK')"
                                                                                                                                                                                                                                                                          python -c "from src.layers.quibidt import QUIBIDTKernel; print('quibidt OK')"
                                                                                                                                                                                                                                                                                    python -c "from src.layers.stratega import STRATEGAPlanner; print('stratega OK')"
                                                                                                                                                                                                                                                                                              python -c "from src.layers.manna import MANNABudgetLayer; print('manna OK')"
                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                lint:
                                                                                                                                                                                                                                                                                                    name: Lint Check
                                                                                                                                                                                                                                                                                                        runs-on: ubuntu-latest
                                                                                                                                                                                                                                                                                                            steps:
                                                                                                                                                                                                                                                                                                                  - name: Checkout repository
                                                                                                                                                                                                                                                                                                                          uses: actions/checkout@v4
                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                - name: Set up Python
                                                                                                                                                                                                                                                                                                                                        uses: actions/setup-python@v5
                                                                                                                                                                                                                                                                                                                                                with:
                                                                                                                                                                                                                                                                                                                                                          python-version: "3.11"
                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                - name: Install flake8
                                                                                                                                                                                                                                                                                                                                                                        run: pip install flake8
                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                              - name: Run flake8
                                                                                                                                                                                                                                                                                                                                                                                      run: flake8 src/ tests/ --max-line-length=120 --ignore=E501,W503
